<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kitties4Lyfe{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fafafa;
        }

        header {
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }

        header h1 a {
            color: white;
            text-decoration: none;
        }

        nav {
            margin-top: 0.5rem;
        }

        nav a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            margin: 0 0.75rem;
            font-size: 0.9rem;
        }

        nav a:hover {
            color: white;
            text-decoration: underline;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h2 {
            color: #c44dff;
            margin: 1.5rem 0 0.75rem;
            font-size: 1.3rem;
        }

        p, li {
            margin-bottom: 0.75rem;
        }

        ul {
            padding-left: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #999;
            font-size: 0.85rem;
        }

        footer a {
            color: #c44dff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">Kitties4Lyfe</a></h1>
        <nav>
            <a href="/">Home</a>
            <a href="/terms">Terms of Service</a>
            <a href="/privacy">Privacy Policy</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        &copy; 2026 Kitties4Lyfe &mdash;
        <a href="/terms">Terms</a> |
        <a href="/privacy">Privacy</a>
    </footer>
</body>
</html>
